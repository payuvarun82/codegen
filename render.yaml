# Render.com Blueprint Configuration
# This file tells Render how to deploy your PHP application

services:
  - type: web
    name: payu-codegen
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PHP_DISPLAY_ERRORS
        value: "Off"
      - key: APP_HOST_BASE_MAP
        value: "payu.in=/integrationlab"
